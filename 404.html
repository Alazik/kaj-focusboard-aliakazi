<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <script>
        const path = location.pathname + location.search + location.hash;
        location.replace(location.origin + location.pathname.split('/').slice(0, -1).join('/') + '/?p=' + encodeURIComponent(path));
    </script>
</head>

<body></body>

</html>
